<!doctype html>
<html>
  <head>
    <title>PhishGuard Pro</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #0b0f0c, #050805);
        color: #e6ffe6;
      }

      .container {
        max-width: 1100px;
        margin: auto;
        padding: 30px;
      }

      .title {
        font-size: 26px;
        font-weight: bold;
      }

      .subtitle {
        color: #8fbf9f;
        margin-bottom: 20px;
      }

      .row {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }

      input {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: #111a13;
        color: white;
        outline: none;
      }

      button {
        padding: 12px 20px;
        border-radius: 10px;
        border: none;
        background: #1a1a1a;
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: #16241a;
      }

      /* QUICK TEST */
      .quick-tests {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .quick-tests button {
        padding: 6px 12px;
        font-size: 12px;
        border-radius: 20px;
        border: 1px solid #2a3a2f;
        background: transparent;
        color: #8fbf9f;
      }

      .quick-tests button:hover {
        background: #16241a;
      }

      .quick-label {
        font-size: 12px;
        color: #8fbf9f;
        display: flex;
        align-items: center;
      }

      /* METRICS */
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        margin-top: 20px;
      }

      .card {
        background: #111a13;
        padding: 15px;
        border-radius: 12px;
      }

      .value {
        font-size: 22px;
        font-weight: bold;
      }

      .green {
        color: #4dff9d;
      }
      .red {
        color: #ff4d4d;
      }

      /* VERDICT */
      .verdict {
        margin-top: 20px;
        padding: 20px;
        border-radius: 12px;
        background: #111a13;
        display: none;
        justify-content: space-between;
        align-items: center;
      }

      /* PANELS */
      .panels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 20px;
      }

      .panel {
        background: #111a13;
        padding: 15px;
        border-radius: 12px;
      }

      .feature {
        display: flex;
        justify-content: space-between;
        margin: 6px 0;
        font-size: 13px;
      }

      .badge {
        padding: 3px 8px;
        border-radius: 8px;
        font-size: 11px;
      }

      .ok {
        background: rgba(0, 255, 100, 0.1);
        color: #4dff9d;
      }
      .warn {
        background: rgba(255, 200, 80, 0.1);
        color: #ffc04d;
      }
      .danger {
        background: rgba(255, 80, 80, 0.1);
        color: #ff4d4d;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="title">🛡️ PhishGuard Pro</div>
      <div class="subtitle">
        Real-time phishing detection & threat intelligence
      </div>

      <!-- INPUT -->
      <div class="row">
        <input id="urlInput" placeholder="Enter URL..." />
        <button onclick="analyzeURL()">Analyze ↗</button>
      </div>

      <!-- QUICK TEST -->
      <div class="quick-tests">
        <span class="quick-label">Quick test:</span>

        <button onclick="setURL('https://paypa1-secure-login.xyz')">
          Suspicious PayPal
        </button>
        <button onclick="setURL('https://google.com')">Google (safe)</button>
        <button onclick="setURL('https://amazon-login-alert.xyz')">
          Fake Amazon
        </button>
        <button onclick="setURL('https://github.com/torvalds/linux')">
          GitHub (safe)
        </button>
        <button onclick="setURL('http://185.220.101.32/paypal')">
          IP-based phish
        </button>
      </div>

      <!-- METRICS -->
      <div class="grid">
        <div class="card">
          <div>Threat score</div>
          <div id="score" class="value">—</div>
        </div>
        <div class="card">
          <div>ML confidence</div>
          <div id="confidence" class="value">—</div>
        </div>
        <div class="card">
          <div>Features flagged</div>
          <div id="flags" class="value">—</div>
        </div>
        <div class="card">
          <div>Scan time</div>
          <div id="time" class="value">—</div>
        </div>
      </div>

      <!-- VERDICT -->
      <div id="verdictBox" class="verdict">
        <div>
          <div id="verdictText"></div>
          <div id="desc" style="color: #8fbf9f"></div>
        </div>
        <div id="confBig" class="value"></div>
      </div>

      <!-- PANELS -->
      <div class="panels">
        <div class="panel">
          <h3>Feature analysis</h3>
          <div id="features"></div>
        </div>

        <div class="panel">
          <h3>Threat intelligence</h3>
          <div id="intel"></div>
        </div>
      </div>
    </div>

    <script>
      function setURL(url) {
        document.getElementById("urlInput").value = url;
        analyzeURL();
      }

      async function analyzeURL() {
        let url = document.getElementById("urlInput").value.trim();
        if (!url) return;

        if (!url.startsWith("http")) {
          url = "https://" + url;
        }

        const start = Date.now();

        const res = await fetch("/analyze", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            url: url,
            analyze_page: false,
          }),
        });

        const data = await res.json();

        const time = ((Date.now() - start) / 1000).toFixed(2);

        // Metrics
        document.getElementById("score").innerText = data.threat_score + "/100";
        document.getElementById("confidence").innerText =
          Math.round(data.confidence * 100) + "%";
        document.getElementById("flags").innerText =
          data.triggered_signals.length + "/17";
        document.getElementById("time").innerText = time + "s";

        // Verdict
        document.getElementById("verdictBox").style.display = "flex";
        document.getElementById("verdictText").innerText =
          data.prediction === "phishing"
            ? "⚠ Phishing detected"
            : "✅ Likely legitimate";

        document.getElementById("desc").innerText = data.recommendation;
        document.getElementById("confBig").innerText =
          Math.round(data.confidence * 100) + "%";

        // Features
        document.getElementById("features").innerHTML = data.triggered_signals
          .map(
            (s) => `
      <div class="feature">
        <span>${s}</span>
        <span class="badge danger">FLAG</span>
      </div>
    `,
          )
          .join("");

        // Intel
        document.getElementById("intel").innerHTML = `
    <div class="feature"><span>Prediction</span><span class="badge">${data.prediction}</span></div>
    <div class="feature"><span>Risk Level</span><span class="badge warn">${data.risk_level}</span></div>
    <div class="feature"><span>Confidence</span><span class="badge ok">${Math.round(data.confidence * 100)}%</span></div>
  `;
      }

      /* 🔥 ENTER KEY SUPPORT */
      document
        .getElementById("urlInput")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            analyzeURL();
          }
        });
    </script>
  </body>
</html>
